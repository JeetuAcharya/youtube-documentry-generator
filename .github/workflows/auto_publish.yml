name: Auto-Publish Daily Documentary

on:
  schedule:
    # 09:30 UTC is exactly 3:00 PM IST
    - cron: '30 9 * * *'
  workflow_dispatch: # Allows you to manually trigger the workflow from the GitHub UI for testing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick libmagick++-dev
          
      - name: Fix ImageMagick Policy for MoviePy
        run: |
          # MoviePy requires ImageMagick to process text clips, but Ubuntu blocks it by default for security. This unblocks it.
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"/<policy domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests edge-tts moviepy==1.0.3 Pillow numpy google-api-python-client google-auth-httplib2 google-auth-oauthlib
          
      - name: Reconstruct YouTube Credentials
        run: |
          echo "${{ secrets.YOUTUBE_CLIENT_SECRETS }}" > client_secrets.json
          echo "${{ secrets.YOUTUBE_CREDENTIALS }}" > credentials.json
          
      - name: Run Documentary Engine (Render & Upload)
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: |
          python documentary_engine.py
